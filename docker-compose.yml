

services:
  kafka:
    image: apache/kafka:latest
    container_name: deployguard_kafka
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: deployguard_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 20s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: deployguard_qdrant
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  frontend:
   image: nginx:alpine
   container_name: deployguard_frontend
   ports:
    - "3000:80"
   volumes:
    - ./frontend/dist:/usr/share/nginx/html:ro
    - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

   depends_on:
    gateway:
      condition: service_started
    aggregator:
      condition: service_started
    kafka:
      condition: service_started
    redis:
      condition: service_started

  gateway:
    build: ./gateway
    container_name: deployguard_gateway
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092

  agent-code-risk:
    build: ./agent-code-risk
    container_name: deployguard_agent_code_risk
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}

  agent-infra-risk:
    build: ./agent-infra-risk
    container_name: deployguard_agent_infra_risk
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}

  agent-incident-history:
    build: ./agent-incident-history
    container_name: deployguard_agent_incident_history
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      QDRANT_URL: http://qdrant:6333

  aggregator:
    build: ./aggregator
    container_name: deployguard_aggregator
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      REDIS_URL: redis://redis:6379/0
  
  repository-context-service:
    build: ./repository-context-service
    container_name: deployguard_repository_context_service

    ports:
      - "8003:8003"

    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, json; res = json.loads(urllib.request.urlopen('http://localhost:8003/readiness').read().decode()); exit(0 if res.get('ready') else 1)\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s